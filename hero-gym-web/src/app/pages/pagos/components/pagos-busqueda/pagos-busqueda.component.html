<div class="mb-6">
  <div class="w-full rounded-2xl bg-white p-4 shadow-md sm:p-5">
    <div class="relative">
      <lucide-icon
        name="search"
        class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"
      ></lucide-icon>

      <input
        type="text"
        placeholder="Buscar por monto, fecha o clientePlanId..."
        [(ngModel)]="termino"
        (input)="onBuscar()"
        class="w-full rounded-xl border border-gray-200 py-3 pl-12 pr-10 text-gray-700 
               focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none
               transition duration-200"
        />

      @if (termino) {
        <button
          (click)="limpiar()"
          class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
          title="Limpiar"
          >
          <lucide-icon name="x"></lucide-icon>
        </button>
      }
    </div>
  </div>
</div>
