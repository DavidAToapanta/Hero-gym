<div class="mx-auto flex w-full max-w-7xl flex-col gap-6">
  <!-- Encabezado -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="flex min-w-0 items-start gap-3">
      <lucide-icon name="credit-card" class="mt-1 h-6 w-6 flex-shrink-0 text-gray-800"></lucide-icon>
      <div class="min-w-0">
        <h2 class="text-2xl font-semibold text-gray-900">Gestión de Pagos</h2>
        <p class="text-sm text-gray-500">Registra y consulta los pagos</p>
      </div>
    </div>

    <div class="flex w-full flex-col gap-3 sm:w-auto sm:flex-row">
      <button
        type="button"
        (click)="nuevoPago()"
        class="inline-flex w-full touch-manipulation items-center justify-center rounded-xl bg-indigo-600 px-4 py-2.5 text-white transition-colors hover:bg-indigo-700 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 sm:w-auto"
      >
        Registrar Pago
      </button>
      <button
        type="button"
        (click)="nuevoIngresoRapido()"
        class="inline-flex w-full touch-manipulation items-center justify-center rounded-xl border border-sky-200 bg-sky-50 px-4 py-2.5 font-medium text-sky-700 transition-colors hover:bg-sky-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-sky-100 sm:w-auto"
      >
        Pago Rápido
      </button>
    </div>
  </div>

  <!-- Modal formulario -->
  @if (mostrarFormulario) {
  <app-pagos-formulario (close)="mostrarFormulario = false" (save)="onGuardarPago($event)"></app-pagos-formulario>
  }

  @if (mostrarIngresoRapido) {
  <app-ingreso-rapido-formulario
    (close)="mostrarIngresoRapido = false"
    (save)="onGuardarIngresoRapido($event)">
  </app-ingreso-rapido-formulario>
  }

  <!-- Búsqueda y lista -->
  <div>
    <app-pagos-busqueda (buscar)="buscarPagos($event)"></app-pagos-busqueda>
    <app-pagos-lista [searchTerm]="terminoActual" (error)="onErrorLista($event)"></app-pagos-lista>
  </div>
</div>

<!-- Toast simple -->
@if (toastVisible) {
<div
  aria-live="polite"
  class="fixed inset-x-4 bottom-4 z-50 rounded-xl bg-gray-900 px-4 py-3 text-white shadow-lg sm:inset-x-auto sm:right-6 sm:bottom-6">
  {{ toastMessage }}
</div>
}
