<div class="mx-auto flex w-full max-w-7xl flex-col gap-6">
  <!-- Encabezado -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="flex min-w-0 items-start gap-3">
      <lucide-icon name="users" class="mt-1 h-6 w-6 flex-shrink-0 text-gray-800"></lucide-icon>
      <div class="min-w-0">
        <h2 class="text-2xl font-semibold text-gray-900">Gestión de Miembros</h2>
        <p class="text-sm text-gray-500">Administra los miembros de tu gimnasio</p>
      </div>
    </div>

    <button
      (click)="mostrarFormulario = true"
      class="inline-flex w-full items-center justify-center rounded-lg bg-indigo-600 px-4 py-2.5 text-white transition hover:bg-indigo-700 sm:w-auto"
    >
      + Nuevo Cliente
    </button>
  </div>

  <!-- Formulario -->
  @if (mostrarFormulario) {
    <app-clientes-formulario
      (close)="mostrarFormulario = false"
      (save)="onGuardarCliente($event)"
    ></app-clientes-formulario>
  }

  <!-- Búsqueda y lista -->
  <div>
    <app-clientes-busqueda (buscar)="buscarClientes($event)"></app-clientes-busqueda>
    <app-clientes-lista [searchTerm]="terminoActual"></app-clientes-lista>
  </div>
</div>
