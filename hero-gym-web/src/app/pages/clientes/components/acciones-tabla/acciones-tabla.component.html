<div class="absolute right-0 mt-2 z-50 w-56">
    <div class="bg-white border border-gray-200 rounded-xl shadow-2xl py-1 overflow-hidden">

        <!-- Nombre del cliente (cabecera informativa) -->
        <div class="px-4 py-2 border-b border-gray-100">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Acciones</p>
            <p class="text-sm font-medium text-gray-800 truncate">
                {{ cliente?.usuario?.nombres }} {{ cliente?.usuario?.apellidos }}
            </p>
        </div>

        <ul class="py-1">
            <!-- Renovar Plan -->
            <li>
                <button (click)="abrirRenovar()"
                    class="flex items-center w-full gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Renovar Plan
                </button>
            </li>

            <!-- Vender Productos -->
            <li>
                <button (click)="abrirProductos()"
                    class="flex items-center w-full gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    Vender Productos
                </button>
            </li>

            <!-- Gestionar Cliente -->
            <li>
                <button (click)="abrirGestion()"
                    class="flex items-center w-full gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M5.121 17.804A7 7 0 0112 15a7 7 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Gestionar Cliente
                </button>
            </li>

            @if (tienePlanActual()) {
            <!-- Quitar Plan -->
            <li>
                <button (click)="abrirConfirmacionQuitarPlan()"
                    class="flex items-center w-full gap-3 px-4 py-2 text-sm text-amber-700 hover:bg-amber-50 hover:text-amber-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Quitar plan
                </button>
            </li>
            }

            <li class="my-1 border-t border-gray-100"></li>

            <!-- Desactivar -->
            <li>
                <button (click)="solicitarDesactivar()"
                    class="flex items-center w-full gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                    </svg>
                    Desactivar
                </button>
            </li>
        </ul>
    </div>
</div>

<!-- Modal Renovar (queda dentro de acciones-tabla) -->
<app-renovar [show]="showRenovarModal" [cliente]="cliente" (close)="cerrarRenovar()"
    (renovado)="onRenovacionConfirmada($event)">
</app-renovar>

<!-- Modal Productos -->
<app-productos-ciente [show]="showProductosModal" [cliente]="cliente" (close)="cerrarProductos()">
</app-productos-ciente>

<!-- Modal Gestión -->
<app-gestion [show]="showGestionModal" [cliente]="cliente" (close)="cerrarGestion()"
    (desactivar)="solicitarDesactivar($event)" (planCambiado)="onPlanCambiado()">
</app-gestion>

<app-confirm-dialog [show]="showQuitarPlanConfirm" title="¿Quitar plan actual?"
    [message]="removePlanError || 'El cliente quedará sin plan asignado.'" confirmText="Quitar plan"
    cancelText="Cancelar" type="warning" (confirmed)="confirmarQuitarPlan()" (cancelled)="cancelarQuitarPlan()">
</app-confirm-dialog>
