<div
  class="acciones-tabla-overlay fixed inset-0 z-40 flex items-start justify-center overflow-y-auto bg-slate-950/60 p-4 backdrop-blur-sm sm:items-center sm:p-6"
  (click)="cerrarMenu()">
  <div
    class="acciones-tabla-panel relative flex w-full max-w-2xl flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_32px_90px_-40px_rgba(15,23,42,0.65)] transition duration-200"
    [ngClass]="tieneModalHijoAbierto() ? 'scale-[0.985] opacity-70' : ''"
    role="dialog"
    aria-modal="true"
    aria-labelledby="acciones-tabla-titulo"
    aria-describedby="acciones-tabla-descripcion"
    (click)="$event.stopPropagation()">

    <!-- Header compacto -->
    <div class="bg-[linear-gradient(135deg,#0f172a_0%,#0f766e_55%,#14b8a6_100%)] px-5 py-4 text-white sm:px-6">
      <div class="flex items-center justify-between gap-4">
        <div class="min-w-0">
          <p class="text-[10px] font-semibold uppercase tracking-[0.28em] text-cyan-200">Acciones del cliente</p>
          <h2 id="acciones-tabla-titulo" class="mt-1 truncate text-lg font-semibold tracking-tight sm:text-xl">
            {{ getNombreCliente() }}
          </h2>
        </div>

        <button
          type="button"
          (click)="cerrarMenu()"
          aria-label="Cerrar acciones del cliente"
          class="inline-flex shrink-0 touch-manipulation items-center justify-center rounded-xl border border-white/15 bg-white/10 p-2.5 text-white transition hover:bg-white/15 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-cyan-200">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Info bar inline -->
      <div class="mt-3 flex flex-wrap items-center gap-x-5 gap-y-1 text-xs text-cyan-100">
        <span><span class="font-semibold text-white">Cédula:</span> {{ getCedulaCliente() }}</span>
        <span><span class="font-semibold text-white">Plan:</span> {{ getPlanActualNombre() }}</span>
        <span
          class="inline-flex rounded-full px-2 py-0.5 text-[10px] font-semibold ring-1 ring-inset"
          [class.bg-emerald-400/15]="getEstadoCliente() === 'Activo'"
          [class.text-emerald-50]="getEstadoCliente() === 'Activo'"
          [class.ring-emerald-100/30]="getEstadoCliente() === 'Activo'"
          [class.bg-amber-400/15]="getEstadoCliente() !== 'Activo'"
          [class.text-amber-50]="getEstadoCliente() !== 'Activo'"
          [class.ring-amber-100/30]="getEstadoCliente() !== 'Activo'">
          {{ getEstadoCliente() }}
        </span>
      </div>
    </div>

    <!-- Contenido principal -->
    <div class="overflow-y-auto p-4 sm:p-5">
      <p id="acciones-tabla-descripcion" class="sr-only">Selecciona una acción para el cliente.</p>

      <!-- Tarjetas de acción - sin descripciones -->
      <div class="grid grid-cols-2 gap-2.5">
        <button
          type="button"
          (click)="abrirRegistroAsistencia()"
          class="group flex items-center gap-3 rounded-xl border border-emerald-200 bg-emerald-50 p-3 text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:bg-emerald-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-emerald-100">
          <span class="inline-flex shrink-0 rounded-lg bg-emerald-600 p-2 text-white">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </span>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900">Registrar asistencia</p>
            <p class="text-xs text-slate-500">Marcar entrada</p>
          </div>
        </button>

        <button
          type="button"
          (click)="abrirRenovar()"
          class="group flex items-center gap-3 rounded-xl border border-indigo-200 bg-indigo-50 p-3 text-left transition hover:-translate-y-0.5 hover:border-indigo-300 hover:bg-indigo-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100">
          <span class="inline-flex shrink-0 rounded-lg bg-indigo-600 p-2 text-white">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </span>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900">Renovar plan</p>
            <p class="text-xs text-slate-500">Nueva vigencia</p>
          </div>
        </button>

        <button
          type="button"
          (click)="abrirProductos()"
          class="group flex items-center gap-3 rounded-xl border border-sky-200 bg-sky-50 p-3 text-left transition hover:-translate-y-0.5 hover:border-sky-300 hover:bg-sky-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-sky-100">
          <span class="inline-flex shrink-0 rounded-lg bg-sky-600 p-2 text-white">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
          </span>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900">Vender productos</p>
            <p class="text-xs text-slate-500">Flujo de venta</p>
          </div>
        </button>

        <button
          type="button"
          (click)="abrirGestion()"
          class="group flex items-center gap-3 rounded-xl border border-teal-200 bg-teal-50 p-3 text-left transition hover:-translate-y-0.5 hover:border-teal-300 hover:bg-teal-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-teal-100">
          <span class="inline-flex shrink-0 rounded-lg bg-teal-600 p-2 text-white">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A7 7 0 0112 15a7 7 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </span>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900">Gestionar cliente</p>
            <p class="text-xs text-slate-500">Plan y perfil</p>
          </div>
        </button>
      </div>

      <!-- Acciones sensibles compactas -->
      <div class="mt-4 flex flex-wrap gap-2.5">
        @if (tienePlanActual()) {
        <button
          type="button"
          (click)="abrirConfirmacionQuitarPlan()"
          class="inline-flex items-center gap-2 rounded-xl border border-amber-300 bg-amber-50 px-4 py-2.5 text-sm font-semibold text-amber-700 transition hover:bg-amber-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-amber-100">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
          </svg>
          Quitar plan
        </button>
        }

        <button
          type="button"
          (click)="solicitarDesactivar()"
          class="inline-flex items-center gap-2 rounded-xl border border-rose-200 bg-rose-50 px-4 py-2.5 text-sm font-semibold text-rose-700 transition hover:bg-rose-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-rose-100">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Desactivar cliente
        </button>
      </div>
    </div>
  </div>
</div>

<app-renovar [show]="showRenovarModal" [cliente]="cliente" (close)="cerrarRenovar()" (renovado)="onRenovacionConfirmada($event)">
</app-renovar>

<app-productos-ciente [show]="showProductosModal" [cliente]="cliente" (close)="cerrarProductos()">
</app-productos-ciente>

<app-gestion [show]="showGestionModal" [cliente]="cliente" (close)="cerrarGestion()" (desactivar)="solicitarDesactivar($event)" (planCambiado)="onPlanCambiado()">
</app-gestion>

<app-registro-asistencia
  [show]="showRegistroAsistenciaModal"
  [cliente]="cliente"
  (close)="cerrarRegistroAsistencia()"
  (asistenciaRegistrada)="onAsistenciaRegistrada()">
</app-registro-asistencia>

<app-confirm-dialog
  [show]="showQuitarPlanConfirm"
  title="Quitar plan actual"
  [message]="removePlanError || 'El cliente quedara sin plan asignado.'"
  confirmText="Quitar plan"
  cancelText="Cancelar"
  type="warning"
  (confirmed)="confirmarQuitarPlan()"
  (cancelled)="cancelarQuitarPlan()">
</app-confirm-dialog>
