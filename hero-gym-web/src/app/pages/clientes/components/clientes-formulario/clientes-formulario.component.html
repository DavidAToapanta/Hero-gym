<!-- Fondo oscuro -->
<div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-black/50 p-4 backdrop-blur-sm sm:items-center sm:p-6">
  <!-- Modal -->
  <div class="relative flex max-h-[90vh] w-full max-w-3xl flex-col overflow-hidden rounded-2xl bg-white p-4 shadow-2xl sm:p-6">
    <!-- Botón cerrar -->
    <button
      (click)="cerrar()"
      class="absolute top-4 right-4 text-gray-500 hover:text-gray-700"
      >
      ✕
    </button>

    <h2 class="text-xl font-semibold text-gray-900 mb-4">
      Registrar Nuevo Cliente
    </h2>

    @if (errorMessage) {
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage }}
      </div>
    }

    <form
      (ngSubmit)="guardar()"
      #clienteForm="ngForm"
      class="flex min-h-0 flex-1 flex-col"
      >
      <div class="grid min-h-0 flex-1 grid-cols-1 gap-4 overflow-y-auto pr-1 sm:grid-cols-2">
      <!-- Nombres -->
      <div>
        <label class="label">Nombres</label>
        <input
          type="text"
          [(ngModel)]="cliente.nombres"
          name="nombres"
          required
          class="input text-black placeholder-gray-400"
          placeholder="Juan Carlos"
          />
      </div>

      <!-- Apellidos -->
      <div>
        <label class="label">Apellidos</label>
        <input
          type="text"
          [(ngModel)]="cliente.apellidos"
          name="apellidos"
          required
          class="input text-black placeholder-gray-400"
          placeholder="García López"
          />
      </div>

      <!-- Cédula -->
      <div>
        <label class="label">Cédula</label>
        <input
          type="text"
          [(ngModel)]="cliente.cedula"
          name="cedula"
          required
          class="input text-black placeholder-gray-400"
          placeholder="1234567890"
          />
      </div>

      <!-- Fecha de nacimiento -->
      <div>
        <label class="label">Fecha de Nacimiento</label>
        <input
          type="date"
          [(ngModel)]="cliente.fechaNacimiento"
          name="fechaNacimiento"
          required
          class="input text-black placeholder-gray-400"
          />
      </div>

      <!-- Usuario -->
      <div>
        <label class="label">Usuario</label>
        <input
          type="text"
          [(ngModel)]="cliente.usuario"
          name="usuario"
          required
          class="input text-black placeholder-gray-400"
          placeholder="jgarcia"
          />
      </div>

      <!-- Contraseña -->
      <div>
        <label class="label">Contraseña</label>
        <input
          type="password"
          [(ngModel)]="cliente.contrasena"
          name="contrasena"
          required
          minlength="6"
          class="input text-black placeholder-gray-400"
          placeholder="••••••"
          />
      </div>

      <!-- Horario -->
      <div class="sm:col-span-2">
        <label class="label">Horario</label>
        <input
          type="text"
          [(ngModel)]="cliente.horario"
          name="horario"
          required
          class="input text-black placeholder-gray-400"
          placeholder="Ej: Lunes a Viernes 6:00-8:00"
          />
      </div>

      <!-- Sexo -->
      <div>
        <label class="label">Sexo</label>
        <select
          [(ngModel)]="cliente.sexo"
          name="sexo"
          required
          class="input text-black placeholder-gray-400"
          >
          <option value="">Seleccionar sexo</option>
          <option value="M">Masculino</option>
          <option value="F">Femenino</option>
        </select>
      </div>

      <!-- Observaciones -->
      <div>
        <label class="label">Observaciones</label>
        <textarea
          [(ngModel)]="cliente.observaciones"
          name="observaciones"
          required
          rows="2"
          class="input resize-none text-black placeholder-gray-400"
          placeholder="Observaciones relevantes del cliente"
        ></textarea>
      </div>

      <!-- Objetivos -->
      <div>
        <label class="label">Objetivos</label>
        <input
          type="text"
          [(ngModel)]="cliente.objetivos"
          name="objetivos"
          required
          class="input text-black placeholder-gray-400"
          placeholder="Perder peso, ganar músculo..."
          />
      </div>

      <!-- Tiempo de entrenamiento -->
      <div class="sm:col-span-2">
        <label class="label">Tiempo de Entrenamiento (minutos)</label>
        <input
          type="number"
          [(ngModel)]="cliente.tiempoEntrenamiento"
          name="tiempoEntrenamiento"
          required
          min="0"
          class="input text-black placeholder-gray-400"
          placeholder="0"
          />
      </div>

      </div>

      <!-- Botones -->
      <div class="mt-4 flex flex-col-reverse gap-3 border-t border-gray-100 pt-4 sm:flex-row sm:justify-end">
        <button
          type="button"
          (click)="cerrar()"
          class="rounded-lg border border-gray-300 px-6 py-3 text-gray-700 transition hover:bg-gray-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="!clienteForm.valid || isSubmitting"
          class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50"
        >
          {{ isSubmitting ? 'Guardando...' : 'Guardar Cliente' }}
        </button>
      </div>
    </form>
  </div>
</div>
