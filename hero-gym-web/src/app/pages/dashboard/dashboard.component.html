<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-8">
  <section>
    <h1 class="text-2xl font-semibold text-gray-900">Dashboard</h1>
    <p class="mt-1 text-sm text-gray-600">
      Resumen general del gimnasio y actividad reciente.
    </p>
  </section>

  <section aria-label="Metricas">
    <app-metrics-cards></app-metrics-cards>
  </section>

  <section class="grid grid-cols-1 xl:grid-cols-12 gap-6" aria-label="Actividad principal">
    <div class="xl:col-span-8">
      <app-recent-members></app-recent-members>
    </div>

    <aside class="xl:col-span-4 space-y-6" aria-label="Panel lateral">
      <app-quick-actions></app-quick-actions>
      <app-notifications></app-notifications>
    </aside>
  </section>

  <section aria-label="Finanzas e ingresos">
    <app-monthly-income-chart></app-monthly-income-chart>
  </section>
</main>
