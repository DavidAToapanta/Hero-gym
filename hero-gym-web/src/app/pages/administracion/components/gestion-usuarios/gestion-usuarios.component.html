<div class="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
  <!-- Encabezado -->
  <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
      <lucide-icon name="users" class="w-5 h-5 text-indigo-600"></lucide-icon>
      Usuarios del Sistema
    </h2>

    <button
      (click)="abrirModal()"
      class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-white transition hover:bg-indigo-700 sm:w-auto">
      <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
      Nuevo Usuario
    </button>
  </div>

  <div class="space-y-3 md:hidden">
    @for (u of usuarios; track u) {
      <article class="rounded-2xl border border-gray-200 p-4 shadow-sm">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <h3 class="font-semibold text-gray-900">{{ u.nombres }} {{ u.apellidos }}</h3>
            <p class="text-sm capitalize text-gray-500">{{ u.rol }}</p>
          </div>
          <span class="rounded-full bg-green-100 px-2 py-1 text-xs text-green-700">Activo</span>
        </div>

        <button (click)="eliminar(u)" class="mt-4 inline-flex w-full items-center justify-center rounded-lg bg-red-50 px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100">
          Eliminar
        </button>
      </article>
    }
  </div>

  <!-- Tabla de usuarios -->
  <div class="hidden overflow-x-auto md:block">
    <table class="min-w-full text-sm border-separate border-spacing-y-2">
      <thead>
        <tr class="text-left text-gray-500 border-b border-gray-200">
          <th class="py-3 font-medium">Nombre</th>
          <th class="py-3 font-medium">Rol</th>
          <th class="py-3 font-medium">Estado</th>
          <th class="py-3 font-medium">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (u of usuarios; track u) {
          <tr
            class="bg-gray-50 hover:bg-gray-100 transition rounded-lg"
            >
            <td class="py-3 px-4 font-medium text-gray-800">{{ u.nombres }} {{ u.apellidos }}</td>
            <td class="py-3 px-4 capitalize">{{ u.rol }}</td>
            <td class="py-3 px-4">
              <span
                class="text-xs px-2 py-1 rounded-full"
                [ngClass]="'bg-green-100 text-green-700'"
                >
                Activo
              </span>
            </td>
            <td class="py-3 px-4">
              <button (click)="eliminar(u)" class="text-red-600 hover:underline">Eliminar</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<!-- Confirmation Dialog -->
<app-confirm-dialog
  [show]="showConfirmDialog"
  [title]="'¿Eliminar usuario?'"
  [message]="usuarioToDelete ? '¿Está seguro que desea eliminar al usuario ' + usuarioToDelete.nombres + ' ' + usuarioToDelete.apellidos + '? Esta acción no se puede deshacer.' : ''"
  confirmText="Eliminar"
  cancelText="Cancelar"
  type="danger"
  (confirmed)="onConfirmDelete()"
  (cancelled)="onCancelDelete()"
></app-confirm-dialog>

<!-- Modal -->
@if (mostrarModal) {
  <app-usuario-modal
    (close)="cerrarModal()"
    (save)="guardarUsuario($event)"
  ></app-usuario-modal>
}
