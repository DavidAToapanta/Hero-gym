<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
  @for (item of stats; track item.titulo) {
    <div
      class="flex items-center justify-between rounded-2xl border border-gray-100 bg-white p-6 shadow-md transition hover:shadow-lg"
    >
      <div class="min-w-0">
        <p class="text-sm text-gray-500">{{ item.titulo }}</p>
        <h3 class="mt-1 text-2xl font-bold text-gray-900 tabular-nums">{{ item.valor }}</h3>
        @if (item.detalle) {
          <p class="mt-2 max-w-[12rem] break-words text-xs leading-5 text-gray-400">
            {{ item.detalle }}
          </p>
        }
      </div>

      <div
        class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl"
        [ngClass]="item.color"
      >
        <lucide-icon [name]="item.icono" class="h-6 w-6" aria-hidden="true"></lucide-icon>
      </div>
    </div>
  }
</div>
