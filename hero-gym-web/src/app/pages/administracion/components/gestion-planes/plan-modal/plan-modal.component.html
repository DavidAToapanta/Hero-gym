<!-- Fondo oscuro -->
<div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-black/50 p-4 backdrop-blur-sm sm:items-center sm:p-6">
    <!-- Modal -->
    <div class="relative w-full max-w-lg rounded-2xl bg-white p-5 shadow-2xl sm:p-8">
      <!-- Botón cerrar -->
      <button
        (click)="close.emit()"
        class="absolute top-4 right-4 text-gray-500 hover:text-gray-700"
      >
        ✕
      </button>
  
      <h2 class="text-xl font-semibold text-gray-900 mb-6 flex items-center gap-2">
        <lucide-icon name="plus-circle" class="w-5 h-5 text-indigo-600"></lucide-icon>
        Nuevo Plan
      </h2>
  
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input
            type="text"
            [(ngModel)]="plan.nombre"
            name="nombre"
            class="input text-black placeholder-gray-400 w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"
            placeholder="Plan Full"
          />
        </div>
  
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea
            [(ngModel)]="plan.descripcion"
            name="descripcion"
            class="input text-black placeholder-gray-400 w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"
            rows="2"
            placeholder="Acceso a todas las máquinas, asesoría personalizada..."
          ></textarea>
        </div>
  
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Precio</label>
            <input
              type="number"
              [(ngModel)]="plan.precio"
              name="precio"
              class="input text-black placeholder-gray-400 w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"
              placeholder="50.00"
            />
          </div>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Duración ({{ plan.unidadDuracion === 'MESES' ? 'meses' : 'días' }})
            </label>
            <input
              type="number"
              [(ngModel)]="plan.duracion"
              name="duracion"
              class="input text-black placeholder-gray-400 w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"
              [placeholder]="plan.unidadDuracion === 'MESES' ? '3' : '30'"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Unidad de duración</label>
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:gap-4">
            <label class="flex items-center cursor-pointer">
              <input
                type="radio"
                name="unidadDuracion"
                value="MESES"
                [(ngModel)]="plan.unidadDuracion"
                class="w-4 h-4 text-indigo-600 focus:ring-indigo-500"
              />
              <span class="ml-2 text-sm text-gray-700">Meses</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input
                type="radio"
                name="unidadDuracion"
                value="DIAS"
                [(ngModel)]="plan.unidadDuracion"
                class="w-4 h-4 text-indigo-600 focus:ring-indigo-500"
              />
              <span class="ml-2 text-sm text-gray-700">Días</span>
            </label>
          </div>
        </div>
  
        <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <button
            type="button"
            (click)="close.emit()"
            class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100"
          >
            Cancelar
          </button>
          <button
            type="button"
            (click)="guardar()"
            class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"
          >
            Guardar Plan
          </button>
        </div>
      </form>
    </div>
  </div>
